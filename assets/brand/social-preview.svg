<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06121A"/>
      <stop offset="55%" stop-color="#0A1A24"/>
      <stop offset="100%" stop-color="#02080C"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.24"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="node" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </radialGradient>
    <radialGradient id="nodeCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A5F3FC"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <ellipse cx="980" cy="320" rx="520" ry="420" fill="url(#cyanGlow)"/>

  <!-- ===== Logo mark (right side) ===== -->
  <g transform="translate(900,320) scale(3.0)">
    <g stroke="#06B6D4" fill="none">
      <path d="M0 0 Q-10 -12 -22 -20" stroke-width="1.2" opacity="0.5"/>
      <path d="M0 0 Q12 -14 22 -22" stroke-width="1.2" opacity="0.5"/>
      <path d="M0 0 Q6 12 14 16" stroke-width="1.2" opacity="0.5"/>
      <path d="M0 0 Q-12 14 -18 20" stroke-width="1.2" opacity="0.5"/>
      <path d="M0 0 Q-14 -6 -26 0" stroke-width="0.9" opacity="0.32"/>
      <path d="M0 0 Q14 -6 26 0" stroke-width="0.9" opacity="0.32"/>
      <path d="M-22 -20 Q-18 -26 -10 -28" stroke-width="0.8" opacity="0.3"/>
      <path d="M22 -22 Q18 -28 10 -32" stroke-width="0.8" opacity="0.3"/>
    </g>
    <circle cx="0" cy="0" r="34" fill="url(#cyanGlow)"/>
    <circle cx="0" cy="0" r="4.2" fill="url(#nodeCore)" filter="url(#soft)"/>
    <circle cx="-22" cy="-20" r="3.6" fill="url(#node)" filter="url(#soft)"/>
    <circle cx="22" cy="-22" r="4" fill="url(#node)" filter="url(#soft)"/>
    <circle cx="14" cy="16" r="3.4" fill="url(#node)" filter="url(#soft)"/>
    <circle cx="-18" cy="20" r="3" fill="url(#node)" filter="url(#soft)"/>
    <circle cx="-26" cy="0" r="2.6" fill="url(#node)" filter="url(#soft)"/>
    <circle cx="26" cy="0" r="2.6" fill="url(#node)" filter="url(#soft)"/>
    <circle cx="-10" cy="-28" r="2.4" fill="url(#node)" opacity="0.85" filter="url(#soft)"/>
    <circle cx="10" cy="-32" r="2.4" fill="url(#node)" opacity="0.85" filter="url(#soft)"/>
  </g>

  <!-- ===== Text (left side) ===== -->
  <g font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
    <text x="100" y="200" fill="#22D3EE" font-size="32" font-weight="700" letter-spacing="5">JD AI SYSTEM OPTIMIZER</text>
    <text x="100" y="298" fill="#FFFFFF" font-size="80" font-weight="800">Stop Overpaying</text>
    <text x="100" y="386" fill="#FFFFFF" font-size="80" font-weight="800">for AI.</text>
    <text x="103" y="452" fill="#9FC3D2" font-size="29" font-weight="400">Route cheap. Fail loud. See every dollar.</text>
    <text x="103" y="496" fill="#6E8A99" font-size="23" font-weight="400">Smart multi-model routing · cost guard · live AI cost statusline</text>
  </g>

  <!-- footer brand bar -->
  <rect x="100" y="556" width="46" height="4" rx="2" fill="#06B6D4"/>
  <text x="160" y="563" fill="#5E7A89" font-family="Helvetica Neue, Helvetica, Arial, sans-serif" font-size="20" font-weight="600">Free &amp; open-source · Built by JD AI System</text>
</svg>
